name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test (IMDB subset)
        env:
          HF_HOME: ${{ github.workspace }}/.hf_cache
          HF_DATASETS_CACHE: ${{ github.workspace }}/.hf_cache/datasets
        run: |
          python run_lab2.py \
            --dataset imdb \
            --seed 42 \
            --max_rows 400 \
            --vectorizer tfidf \
            --model logreg

      - name: Verify required outputs exist
        run: |
          test -f outputs/logs/data_audit.md
          test -f outputs/logs/audit_before.md
          test -f outputs/logs/audit_after.md
          test -f outputs/logs/run_summary.json
          test -f outputs/splits/train.csv
          test -f outputs/splits/val.csv
          test -f outputs/splits/test.csv
          test -f outputs/metrics/metrics_summary.json
          test -f outputs/metrics/metrics_summary.md
          test -f outputs/figures/confusion_matrix.png
          test -f outputs/error_analysis/error_analysis.csv
          test -f outputs/error_analysis/error_analysis_summary.md
          test -f outputs/pipeline/model_pipeline.joblib
          test -f outputs/predictions/test_predictions.csv

      - uses: actions/upload-artifact@v4
        with:
          name: lab2-outputs
          path: outputs/
          if-no-files-found: error
